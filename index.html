<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glenn Buttigieg</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080b10;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text-primary: #f0f4ff;
      --text-muted: rgba(240,244,255,0.45);
      --accent: #7eb8ff;
      --accent2: #a78bfa;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas#bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
    }

    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem;
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 14px;
      margin-bottom: 2rem;
      animation: rise 1s 0.1s cubic-bezier(0.16,1,0.3,1) both;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    h1 {
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #f0f4ff 0%, rgba(240,244,255,0.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
      animation: rise 1s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }

    .roles {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      font-weight: 300;
      color: var(--accent);
      height: 1.4em;
      margin-bottom: 2.5rem;
      animation: rise 1s 0.25s cubic-bezier(0.16,1,0.3,1) both;
      letter-spacing: 0.01em;
    }
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .links {
      display: flex;
      gap: 12px;
      animation: rise 1s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-primary);
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      backdrop-filter: blur(12px);
      cursor: pointer;
    }
    .link-btn:hover {
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }
    .link-btn:active { transform: translateY(0); }

    .link-btn svg { width: 17px; height: 17px; flex-shrink: 0; }

    .link-btn.primary {
      background: rgba(126,184,255,0.12);
      border-color: rgba(126,184,255,0.25);
      color: var(--accent);
    }
    .link-btn.primary:hover {
      background: rgba(126,184,255,0.2);
      border-color: rgba(126,184,255,0.45);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 2.5rem auto;
      animation: rise 1s 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }

    .meta {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      animation: rise 1s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="grain"></div>

  <div class="container">
    <div class="badge">
    </div>

    <h1>Glenn Buttigieg</h1>

    <div class="roles">
      <span id="typed"></span><span class="cursor"></span>
    </div>

    <div class="links">
      <a class="link-btn primary" href="https://github.com/GlennBu" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
        GitHub
      </a>
      <a class="link-btn" href="https://www.linkedin.com/in/glenn-buttigieg-35bbb9bb" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </a>
    </div>

    <div class="divider"></div>
    <p class="meta">malta &nbsp;·&nbsp; cloud &amp; devops</p>
  </div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H, orbs;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function makeOrbs() {
      return [
        { x: W*0.2, y: H*0.3, r: Math.min(W,H)*0.38, vx: 0.15, vy: 0.08, color: '126,184,255' },
        { x: W*0.75, y: H*0.6, r: Math.min(W,H)*0.32, vx: -0.12, vy: 0.1,  color: '167,139,250' },
        { x: W*0.5,  y: H*0.85, r: Math.min(W,H)*0.25, vx: 0.1,  vy: -0.09, color: '56,189,248' },
      ];
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      orbs.forEach(o => {
        o.x += o.vx; o.y += o.vy;
        if (o.x < -o.r || o.x > W+o.r) o.vx *= -1;
        if (o.y < -o.r || o.y > H+o.r) o.vy *= -1;
        const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
        g.addColorStop(0, `rgba(${o.color},0.18)`);
        g.addColorStop(1, `rgba(${o.color},0)`);
        ctx.beginPath();
        ctx.arc(o.x, o.y, o.r, 0, Math.PI*2);
        ctx.fillStyle = g;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    resize();
    orbs = makeOrbs();
    draw();
    window.addEventListener('resize', () => { resize(); orbs = makeOrbs(); });

    const roles = ['Cloud Whisperer', 'Pipeline Therapist', 'Kubernetes Wrangler', 'DevOps Engineer'];
    let ri = 0, ci = 0, deleting = false;
    const el = document.getElementById('typed');

    function tick() {
      const word = roles[ri];
      if (!deleting) {
        el.textContent = word.slice(0, ++ci);
        if (ci === word.length) { deleting = true; setTimeout(tick, 1800); return; }
        setTimeout(tick, 65);
      } else {
        el.textContent = word.slice(0, --ci);
        if (ci === 0) { deleting = false; ri = (ri+1) % roles.length; setTimeout(tick, 400); return; }
        setTimeout(tick, 40);
      }
    }
    tick();
  </script>
</body>
</html>
